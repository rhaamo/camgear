name: Test builds

on: push

jobs:
  app:
    name: Test build backend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python: [3.6, 3.7, 3.8, 3.9]

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_DB: camgear_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Uses Python ${{ matrix.python }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python }}
      - name: Cache pip
        uses: actions/cache@v2
        with:
          # This path is specific to Ubuntu
          path: ~/.cache/pip
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-pip-${{ matrix.python }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python }}
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y postgresql-client git libffi7 libffi-dev cmake build-essential make pkg-config

      - name: Install python dependencies
        run: |
          pip install --requirement requirements.txt
          pip install black
          pip install flake8

      - name: Lint code
        run: |
          black --check .
          flake8 . --count --show-source --statistics

      - name: Test full migrations
        run: |
          psql -U postgres -h localhost -w -c 'CREATE DATABASE camgear'
          cp config.py.sample config.py
          flask db upgrade
  docker-image:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: dashie/camgear:latest
      -
        name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}